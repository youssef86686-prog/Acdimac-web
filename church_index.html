<script>
const verses=[
"ابدأ يومك بهدف واضح حتى لو كان بسيطًا.","لا تؤجل مذاكرتك… المستقبل يتبني بما تفعله اليوم.","كل ساعة مذاكرة اليوم تقربك من حلمك.","اجتهد الآن لترتاح لاحقًا.","لا تقارن نفسك بغيرك بل بنفسك بالأمس.","النجاح يحتاج استمرار وليس ذكاء فقط.","رتب وقتك فالوقت غير المنظم يضيع الأحلام.","لو تعبت تذكر لماذا بدأت.","اجعل هاتفك بعيدًا أثناء المذاكرة.","ابدأ بالأصعب أولًا ثم الأسهل.","كل يوم فرصة جديدة لتكون أفضل.","القليل المنتظم أفضل من الكثير المتقطع.","الفشل درس وليس نهاية.","احط نفسك بأصدقاء يشجعونك على النجاح.","حدد هدفك بوضوح واسعي نحوه.","التعب اليوم يصنع نجاح الغد.","لا تضيع وقتك فيما لا يفيد.","التركيز أهم من عدد ساعات المذاكرة.","كافئ نفسك بعد إنجاز مهامك.","تعلم من أخطائك ولا تخجل منها.","كل إنجاز كبير يبدأ بخطوة صغيرة.","الثقة بالنفس نصف النجاح.","لا تسمح لليأس أن يسرق حلمك.","اجعل لك خطة أسبوعية للمذاكرة.","العلم هو أفضل استثمار للمستقبل.","الاستمرار أهم من الحماس المؤقت.","تعلم مهارات جديدة بجانب الدراسة.","اقطع أي شيء يشتت تركيزك.","اجعل حلمك أمام عينيك دائمًا.","النجاح رحلة وليس محطة.","الإنجازات الصغيرة تصنع إنجازات كبيرة.","الانضباط أهم طريق للنجاح.","الفترة الصعبة تصنع أشخاصًا أقوى.","اقرأ ولو صفحة كل يوم.","اجعل لك وقتًا للراحة حتى لا تمل.","لا تستسلم حتى لو تأخر النجاح.","كل يوم بدون هدف هو يوم ضائع.","الإنسان الناجح لا يستسلم.","استثمر وقتك في التعلم.","الصلاة تعطيك قوة وسلام.","حافظ على صحتك ونومك الجيد.","ركز على هدفك وليس على الصعوبات.","لا تخف من السؤال عندما لا تفهم.","كل مشكلة لها حل إذا فكرت بهدوء.","تعلم الصبر فهو مفتاح النجاح.","اعمل بجد حتى تفخر بنفسك.","المستقبل يصنعه المجتهدون.","ثق أن تعبك لن يضيع.","ابدأ الآن وليس غدًا.","اجعل يومك أفضل من أمس."
];

function getShuffledIndexes(seed,length){
const random=mulberry32(seed);
const arr=Array.from({length},(_,i)=>i);
for(let i=arr.length-1;i>0;i--){
const j=Math.floor(random()*(i+1));
[arr[i],arr[j]]=[arr[j],arr[i]];
}
return arr;
}

function mulberry32(a){
return function(){
var t=(a+=0x6d2b79f5);
t=Math.imul(t^(t>>>15),t|1);
t^=t+Math.imul(t^(t>>>7),t|61);
return((t^(t>>>14))>>>0)/4294967296;
}
}

function displayVersePreview(){
const now=new Date();
const startDate=new Date("2024-01-01");
const daysPassed=Math.floor((now-startDate)/(1000*60*60*24));
const round=Math.floor(daysPassed/verses.length);
const dayIndex=daysPassed%verses.length;
const shuffledIndexes=getShuffledIndexes(round,verses.length);
const verse=verses[shuffledIndexes[dayIndex]];
document.getElementById("versePreview").innerText=verse;
}

displayVersePreview();
